build_app:
  stage: build
  script: 
    - mvn package
  tags:
    - self-hosted
  only:
    - main


build_and_tag_psuh_image:
  stage: docker
  script:
    - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
    - mvn package
    - docker build -t prathamesh45/boardgitlab:latest .
    - docker push prathamesh45/boardgitlab:latest
  tags:
    - self-hosted
  only:
    - main


deploy_with_compose:
  stage: Deploy
  script:
    - docker pull prathamesh45/boardgitlab:latest
    - docker compose down || true
    - docker compose up -d
    - sleep 5
    - docker ps
    - docker logs boardgitlab-app --tail 20
    - curl -f http://localhost:8080 || echo "Application might still be starting...."
    - echo "Deployment successful...! Application Running on the http://localhost:8080"
  tags:
    - self-hosted
  only:
    - main
  needs:
    - build_and_tag_psuh_image
  

    